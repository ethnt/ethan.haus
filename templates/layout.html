<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">

    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="{{ config.description }}">

    <title>{% if section.page_title %}{{ section.page_title }} &mdash; {% endif %}{{ config.title }}</title>

    <link rel="stylesheet" href="{{ get_url(path="application.css") }}" />
    <link rel="icon" type="image/png" href="{{ get_url(path="favicon.png") }}">
  </head>
  <body>
    <header class="header">
      <aside class="header__info">
        <h1><a href="{{ get_url(path="@/_index.md") }}">{{ config.title }}</a></h1>
      </aside>
      <nav class="header__nav nav">
        <ul>
          <!-- <li><a href="#">Commonplace</a></li>
          <li><a href="#">Links</a></li>
          <li><a href="#">Contact</a></li> -->
        </ul>
      </nav>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <aside class="footer__copyright">
        <p>&copy; {{ now() | date(format="%Y") }} <a href="{{ get_url(path="/") }}">{{ config.title }}</a></p>
      </aside>
      <nav class="footer__nav nav">
        <ul>
          {% for social in config.extra.socials %}
            <li><a href="{{ social.link }}">{{ social.name }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </footer>
  </body>
</html>
